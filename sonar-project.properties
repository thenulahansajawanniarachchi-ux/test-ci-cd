# SonarCloud project configuration
sonar.projectKey=Thenula09_test-ci-cd
sonar.organization=thenula09

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=React CI/CD Test App
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
# This property is optional if sonar.modules is set.
sonar.sources=src
sonar.tests=src/test
sonar.test.inclusions=**/*.test.jsx,**/*.test.js,**/*.spec.jsx,**/*.spec.js
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**

# Encoding of the source code.
sonar.sourceEncoding=UTF-8

# JavaScript/TypeScript analysis
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Additional parameters
sonar.coverage.exclusions=**/*.test.jsx,**/*.test.js,**/*.spec.jsx,**/*.spec.js,**/test/**
